name: serving-ci

on:
  push:
    paths: ["serving/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["serving/**"]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r serving/requirements.txt pytest

      - name: Run tests (skew + API smoke)
        run: pytest serving/tests -q

      - name: Build Docker image
        run: docker build -f serving/Dockerfile -t amex-default-api:ci .

  deploy:
    # Deploys to Cloud Run on pushes to main, once GCP_SA_KEY + GCP_PROJECT
    # secrets are configured (no-op otherwise).
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy to Cloud Run
        if: steps.auth.outcome == 'success'
        run: |
          gcloud config set project "${{ secrets.GCP_PROJECT }}"
          bash serving/deploy_cloudrun.sh
